apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aap-namespace-provisioning-fancy
  title: 🚀 Enterprise Namespace Factory
  description: |
    Provisions a secure OpenShift environment via Ansible. 
    **Choose your preferred notification channel (Slack or Teams).**
  tags:
    - ansible
    - notifications
    - interactive-ui
spec:
  owner: group:default/platform-engineers
  type: project

  parameters:
    - title: Step 1 - Core Identity
      required: [component_id, project_owner]
      properties:
        component_id:
          title: Namespace Name
          type: string
          ui:autofocus: true
        project_owner:
          title: Primary Owner
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: [User, Group]

    - title: Step 2 - Resource Allocation
      properties:
        namespace_size:
          title: Resource Tier
          type: string
          default: small
          oneOf:
            - title: "🍃 Small (2vCPU / 8Gi)"
              const: small
            - title: "🔥 Large (8vCPU / 32Gi)"
              const: large

    - title: Step 3 - Communication Preferences
      properties:
        notification_mode:
          title: Where should we send updates?
          type: string
          default: slack
          enum:
            - slack
            - teams
            - both
          enumNames:
            - "💬 Slack"
            - "🟦 Microsoft Teams"
            - "🌟 Both Channels"
      
    # Conditional Step: Only shows if Slack or Both is selected
    - title: Slack Configuration
      dependencies:
        notification_mode: ['slack', 'both']
      properties:
        slack_channel:
          title: Slack Channel
          type: string
          default: "#dev-alerts"
          description: "Which channel should we post to?"

    # Conditional Step: Only shows if Teams or Both is selected
    - title: Teams Configuration
      dependencies:
        notification_mode: ['teams', 'both']
      properties:
        teams_channel_name:
          title: Teams Channel Name
          type: string
          default: "Platform Engineering"
          description: "Friendly name for the Teams notification."

  steps:
    # --- SLACK LOGIC ---
    - id: notify-slack
      name: 💬 Sending Slack Notification
      if: ${{ parameters.notification_mode == 'slack' or parameters.notification_mode == 'both' }}
      action: notifications:send:slack
      input:
        channel: ${{ parameters.slack_channel }}
        message: "🚀 *Provisioning Started* for project: ${{ parameters.component_id }}"

    # --- TEAMS LOGIC ---
    - id: notify-teams
      name: 🟦 Sending MS Teams Notification
      if: ${{ parameters.notification_mode == 'teams' or parameters.notification_mode == 'both' }}
      action: notifications:send:microsoft-teams
      input:
        webhookUrl: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: "New Namespace Request"
        text: "The project **${{ parameters.component_id }}** is being provisioned in the **${{ parameters.teams_channel_name }}** context."

    - id: trigger-aap
      name: 🤖 Handing off to Ansible (AAP)
      action: rhaap:launch-job-template
      input:
        template_id: 'YOUR_TEMPLATE_ID'
        extra_vars:
          namespace_name: ${{ parameters.component_id }}
          owner: ${{ parameters.project_owner }}
          notif_pref: ${{ parameters.notification_mode }}

    - id: register
      name: 📂 Cataloging
      action: catalog:register
      input:
        repoContentsUrl: "https://github.com/your-org/infra-repo/blob/main/catalog-info.yaml"

  output:
    links:
      - title: 🛠️ Monitor AAP Job
        url: ${{ steps['trigger-aap'].output.job_url }}
