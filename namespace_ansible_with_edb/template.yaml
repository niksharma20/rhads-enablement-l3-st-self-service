apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aap-namespace-provisioning-ultimate
  title: 🚀 Enterprise Namespace Factory
  description: |
    Provision a secure, hardened OpenShift environment with built-in storage, 
    database (EDB), secrets management (Vault), and custom notifications.
  tags:
    - ansible
    - platform-engineering
    - automation
spec:
  owner: group:default/platform-engineers
  type: project

  parameters:
    - title: Step 1 - Project Identity
      required: [component_id, project_owner]
      properties:
        component_id:
          title: Namespace Name
          type: string
          description: "Unique name (e.g., 'mobile-api-dev')"
          ui:autofocus: true
        project_owner:
          title: Primary Owner
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: [User, Group]

    - title: Step 2 - Resource Allocation
      properties:
        namespace_size:
          title: Compute Resource Tier
          type: string
          default: small
          oneOf:
            - title: "🍃 Small - (2vCPU / 8Gi)"
              const: small
            - title: "⚡ Medium - (4vCPU / 16Gi)"
              const: medium
            - title: "🔥 Large - (8vCPU / 32Gi)"
              const: large
        storage_request:
          title: Persistent Storage Quota (GB)
          type: number
          default: 10
          minimum: 1
          maximum: 500
          description: "Total storage allowance for your Persistent Volume Claims."

    - title: Step 3 - Advanced Add-ons
      properties:
        enable_edb:
          title: 🐘 Provision EDB Postgres Cluster?
          type: boolean
          default: false
        enable_vault:
          title: 🔐 Setup HashiCorp Vault Integration?
          type: boolean
          default: false
        db_instances:
          title: Database High Availability Nodes
          type: integer
          default: 3
          enum: [1, 3]
          description: "Only used if EDB is enabled."
      # This dependencies block is now correctly structured
      dependencies:
        db_instances:
          oneOf:
            - properties:
                enable_edb: { enum: [true] }

    - title: Step 4 - Communication Preferences
      properties:
        notification_mode:
          title: Where should we send updates?
          type: string
          default: slack
          enum: [slack, teams, both, none]
          enumNames: ["💬 Slack", "🟦 Microsoft Teams", "🌟 Both", "🤫 None"]
        slack_channel:
          title: Slack Channel
          type: string
          default: "#dev-alerts"
        teams_channel_name:
          title: Teams Context Name
          type: string
          default: "General"
      dependencies:
        slack_channel:
          oneOf:
            - properties:
                notification_mode: { enum: [slack, both] }
        teams_channel_name:
          oneOf:
            - properties:
                notification_mode: { enum: [teams, both] }

  steps:
    - id: notify-slack
      name: 💬 Sending Slack Alert
      if: ${{ parameters.notification_mode == 'slack' or parameters.notification_mode == 'both' }}
      action: notifications:send:slack
      input:
        channel: ${{ parameters.slack_channel }}
        message: "🚀 *Namespace Provisioning Started* \n *Project:* `${{ parameters.component_id }}` \n *Owner:* ${{ parameters.project_owner }}"

    - id: notify-teams
      name: 🟦 Sending MS Teams Alert
      if: ${{ parameters.notification_mode == 'teams' or parameters.notification_mode == 'both' }}
      action: notifications:send:microsoft-teams
      input:
        webhookUrl: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: "Provisioning Initialized"
        text: "Project **${{ parameters.component_id }}** is being built by Ansible."

    - id: trigger-aap
      name: 🤖 Executing Ansible Automation Platform
      action: rhaap:launch-job-template
      input:
        template_id: 'YOUR_AAP_TEMPLATE_ID' # Ensure this is a string ID
        extra_vars:
          namespace_name: ${{ parameters.component_id }}
          owner: ${{ parameters.project_owner }}
          size: ${{ parameters.namespace_size }}
          storage_gb: "${{ parameters.storage_request }}Gi"
          setup_edb: ${{ parameters.enable_edb }}
          edb_nodes: ${{ parameters.db_instances | default(1) }}
          setup_vault: ${{ parameters.enable_vault }}
          notif_pref: ${{ parameters.notification_mode }}

    - id: register
      name: 📂 Registering in Software Catalog
      action: catalog:register
      input:
        repoContentsUrl: "https://github.com/niksharma20/rhads-enablement-l3-st-self-service/blob/main/namespace_ansible_with_edb/catalog-info.yaml"

  output:
    links:
      - title: 🛠️ Monitor AAP Job Progress
        url: ${{ steps['trigger-aap'].output.job_url }}
