apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aap-namespace-provisioning-ultimate
  title: 🛡️ Enterprise Namespace Factory (Internal Alerts)
  description: |
    Full-lifecycle provisioning: Hardened OpenShift Namespace, **EDB Postgres**, **Vault**, **Dev Spaces** IDE, and **EDA Guardian**.
  tags:
    - ansible
    - eda
    - devspaces
    - vault
    - edb
spec:
  owner: group:default/platform-engineers
  type: project

  parameters:
    - title: Step 1 - Project Identity
      required: [component_id, project_owner]
      properties:
        component_id:
          title: Namespace Name
          type: string
          description: "Unique name (e.g., 'inventory-api-dev')"
          ui:autofocus: true
        project_owner:
          title: Primary Owner
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: [User, Group]

    - title: Step 2 - Resource Allocation
      properties:
        namespace_size:
          title: Compute Tier
          type: string
          default: small
          oneOf:
            - title: "Small - (2vCPU / 8Gi)"
              const: small
            - title: "Large - (8vCPU / 32Gi)"
              const: large
        storage_request:
          title: Storage Quota (GB)
          type: number
          default: 10
          minimum: 1
          maximum: 500

    - title: Step 3 - Advanced Add-ons
      properties:
        enable_edb:
          title: Provision EDB Postgres Cluster?
          type: boolean
          default: false
        enable_vault:
          title: Setup HashiCorp Vault Integration?
          type: boolean
          default: false
        enable_devspaces:
          title: Initialize OpenShift Dev Spaces?
          type: boolean
          default: true
        enable_eda_guardian:
          title: Enable EDA Self-Healing?
          type: boolean
          default: true
        db_instances:
          title: Database Nodes
          type: integer
          default: 3
          enum: [1, 3]
      dependencies:
        db_instances:
          oneOf:
            - properties:
                enable_edb: { enum: [true] }

  steps:
    # --- INTERNAL DEV HUB NOTIFICATION ---
    - id: internal-notify
      name: Sending Platform Notification
      action: notifications:send
      input:
        # This sends the alert to the 'project_owner' identified in Step 1
        recipients: 
          - entityRef: ${{ parameters.project_owner }}
        title: "Provisioning Initialized"
        message: "Your request for namespace '${{ parameters.component_id }}' has been received. Ansible is now building the environment."
        topic: "Provisioning"

    - id: trigger-aap
      name: Executing Ansible (AAP)
      action: rhaap:launch-job-template
      input:
        template_id: 'YOUR_AAP_TEMPLATE_ID'
        extra_vars:
          namespace_name: ${{ parameters.component_id }}
          owner: ${{ parameters.project_owner }}
          size: ${{ parameters.namespace_size }}
          storage_gb: "${{ parameters.storage_request }}Gi"
          setup_edb: ${{ parameters.enable_edb }}
          edb_nodes: ${{ parameters.db_instances | default(1) }}
          setup_vault: ${{ parameters.enable_vault }}
          setup_devspaces: ${{ parameters.enable_devspaces }}
          eda_enabled: ${{ parameters.enable_eda_guardian }}

    - id: register
      name: Registering in Catalog
      action: catalog:register
      input:
        repoContentsUrl: "https://github.com/niksharma20/rhads-enablement-l3-st-self-service/blob/main/namespace_ansible_with_edb/catalog-info.yaml"

  output:
    links:
      - title: Monitor Provisioning (AAP)
        url: ${{ steps['trigger-aap'].output.job_url }}
      - title: OpenShift Project
        url: "https://console-openshift-console.apps.yourcluster.com/k8s/cluster/projects/${{ parameters.component_id }}"
      - title: Launch Dev Space
        url: "https://devspaces.apps.yourcluster.com/#/namespaces/${{ parameters.component_id }}"
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
