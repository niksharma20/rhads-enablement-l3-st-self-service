apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aap-namespace-provisioning-fancy
  title: 🚀 Enterprise Namespace Factory
  description: |
    Provisions a secure OpenShift environment via Ansible. 
    **Includes Slack & MS Teams notifications.**
  tags:
    - ansible
    - notifications
    - security-hardened
spec:
  owner: group:default/platform-engineers
  type: project

  parameters:
    - title: Step 1 - Core Identity
      required: [component_id, project_owner]
      properties:
        component_id:
          title: Namespace Name
          type: string
          ui:autofocus: true
        project_owner:
          title: Primary Owner
          type: string
          ui:field: EntityPicker
          ui:options:
            catalogFilter:
              kind: [User, Group]

    - title: Step 2 - Resource Allocation
      properties:
        namespace_size:
          title: Resource Tier
          type: string
          default: small
          oneOf:
            - title: "🍃 Small (2vCPU / 8Gi)"
              const: small
            - title: "🔥 Large (8vCPU / 32Gi)"
              const: large
        storage_request:
          title: Persistent Storage (GB)
          type: number
          default: 10

    - title: Step 3 - Add-ons
      properties:
        enable_edb:
          title: 🐘 Provision EDB Postgres?
          type: boolean
          default: false

  steps:
    # --- NOTIFICATION START ---
    - id: notify-slack
      name: 💬 Sending Slack Notification
      action: notifications:send:slack
      input:
        channel: '#platform-alerts'
        message: "🚀 *New Provisioning Started* \n *Project:* ${{ parameters.component_id }} \n *Owner:* ${{ parameters.project_owner }} \n *Size:* ${{ parameters.namespace_size }}"

    - id: notify-teams
      name: 🟦 Sending MS Teams Notification
      action: notifications:send:microsoft-teams
      input:
        webhookUrl: ${{ secrets.TEAMS_WEBHOOK_URL }}
        title: "New Namespace Request"
        text: "The project **${{ parameters.component_id }}** is currently being provisioned by Ansible for owner **${{ parameters.project_owner }}**."
    # --- NOTIFICATION END ---

    - id: trigger-aap
      name: 🤖 Handing off to Ansible (AAP)
      action: rhaap:launch-job-template
      input:
        template_id: 'YOUR_TEMPLATE_ID'
        extra_vars:
          namespace_name: ${{ parameters.component_id }}
          owner: ${{ parameters.project_owner }}
          size: ${{ parameters.namespace_size }}
          storage_gb: "${{ parameters.storage_request }}Gi"
          setup_edb: ${{ parameters.enable_edb }}

    - id: register
      name: 📂 Cataloging the new Environment
      action: catalog:register
      input:
        repoContentsUrl: "https://github.com/your-org/infra-repo/blob/main/catalog-info.yaml"

  output:
    links:
      - title: 🛠️ Monitor AAP Job
        url: ${{ steps['trigger-aap'].output.job_url }}
      - title: 📖 View in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
