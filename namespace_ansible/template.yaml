apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aap-namespace-provisioning
  title: Enterprise Namespace via Ansible
  description: Provisions a secure OpenShift Namespace with Network Policies, EDB, and Vault via AAP.
  tags:
    - ansible
    - aap
    - namespace
    - eda
spec:
  owner: group:default/tssc
  type: project
  parameters:
    - title: Namespace Details
      required:
        - component_id
        - namespace_owner
      properties:
        component_id:
          title: Namespace Name
          type: string
          description: Unique name of the namespace
        namespace_owner:
          title: Owner
          type: string
          description: The user or group responsible for this project
        namespace_size:
          title: Performance Profile
          default: small
          enum:
            - small
            - medium
            - large
          enumNames:
            - 'Small (2vCPU / 8Gi)'
            - 'Medium (3vCPU / 12Gi)'
            - 'Large (6vCPU / 24Gi)'
        
    - title: Add-on Services (Day 2 Readiness)
      properties:
        storage_request:
          title: Persistent Storage Quota
          type: string
          default: "10Gi"
          description: Total storage allowance for the namespace
        enable_edb:
          title: Provision EDB Postgres?
          type: boolean
          default: false
        enable_vault:
          title: Setup Vault Secrets Path?
          type: boolean
          default: false

  steps:
    - id: trigger-aap
      name: Triggering Ansible Automation
      action: rhaap:launch-job-template
      input:
        # NOTE: Ensure the AAP integration is configured in app-config.yaml
        template_id: 'ENTER_YOUR_AAP_JOB_ID_HERE' 
        extra_vars:
          namespace_name: ${{ parameters.component_id }}
          owner: ${{ parameters.namespace_owner }}
          size: ${{ parameters.namespace_size }}
          storage_gb: ${{ parameters.storage_request }}
          setup_edb: ${{ parameters.enable_edb }}
          setup_vault: ${{ parameters.enable_vault }}

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        # Here we point to a static catalog-info or one generated by Ansible
        catalogInfoPath: "/catalog-info.yaml"

  output:
    links:
      - title: View Job in Ansible Automation Platform
        url: ${{ steps['trigger-aap'].output.job_url }}
      - title: Open Component in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
